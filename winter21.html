<script>
    const quizQuestions = [
        {
            id: 1,
            question: "Welche der folgenden Aussagen ist <b>falsch</b>?",
            options: [
                "$\\langle f, g\\rangle := \\int_{-\\pi}^{\\pi} f(x) \\cdot g(x) dx$ ist ein Skalarprodukt auf dem Vektorraum der stetigen reellen Funktionen $C(\\mathbb{R}, \\mathbb{R})$.",
                "$\\langle f, g\\rangle := \\int_{-\\pi}^{\\pi} f(x) \\cdot g(x) dx$ ist ein Skalarprodukt auf $P$, dem Raum der Polynome.",
                "$\\langle f, g\\rangle := \\int_{-1}^{1} 2 \\cdot f(x) \\cdot g(x) dx$ ist ein Skalarprodukt auf $P_3$, dem Raum der Polynome vom Grad $\\le 3$.",
                "$\\langle (x_1, x_2)^T, (y_1, y_2)^T \\rangle = x_1y_1 + 2x_2y_2$ ist ein Skalarprodukt auf $\\mathbb{R}^2$."
            ],
            correct: 0,
            explanation: "Die korrekte Lösung ist (A), da diese Aussage falsch ist. Das Integral über ein beschränktes Intervall $[-\\pi, \\pi]$ definiert auf dem Raum <b>aller</b> stetigen Funktionen $C(\\mathbb{R}, \\mathbb{R})$ kein gültiges Skalarprodukt. Eine Funktion könnte außerhalb von $[-\\pi, \\pi]$ ungleich Null sein, aber im Intervall komplett 0. Dann wäre das Skalarprodukt $\\langle f, f\\rangle = 0$, obwohl $f \\neq 0$ ist (Positive Definitheit verletzt). Für Polynome (B, C) reicht das begrenzte Intervall jedoch, da ein Polynom, das auf einem Intervall 0 ist, überall 0 sein muss."
        },
        {
            id: 2,
            question: "Welche der folgenden Teilmengen des Vektorraums von reellen Funktionen $F(\\mathbb{R}, \\mathbb{R})$ ist <b>kein</b> Untervektorraum?",
            options: [
                "$\\{f : \\mathbb{R} \\rightarrow \\mathbb{R} \\mid f(1) = 0\\}$",
                "$\\{f : \\mathbb{R} \\rightarrow \\mathbb{R} \\mid f(0) = 1\\}$",
                "$F(\\mathbb{R}, \\mathbb{R})$",
                "$\\{f : \\mathbb{R} \\rightarrow \\mathbb{R} \\mid f$ ist von der Form $f(x) = ax^2 + bx + c$ mit $a, b, c \\in \\mathbb{R}\\}$"
            ],
            correct: 1,
            explanation: "Die Menge in (B) ist kein Unterraum, da sie die Nullfunktion ($f(x) = 0$ für alle $x$) nicht enthält. Außerdem ist die Menge nicht additiv abgeschlossen: Die Summe zweier solcher Funktionen $f, g$ ergäbe $(f+g)(0) = f(0) + g(0) = 1 + 1 = 2 \\neq 1$."
        },
        {
            id: 3,
            question: "Sei $A \\in \\mathbb{R}^{3\\times3}$ eine Matrix mit charakteristischem Polynom $p_A(\\lambda) = \\det(A - \\lambda I) = -\\lambda^3 + 2\\lambda^2 + 1$. Welche Aussage gilt für $\\det(A)$?",
            options: [
                "$\\det(A) = 1$",
                "$\\det(A) = 2$",
                "$\\det(A) = -1$",
                "$\\det(A) = -2$"
            ],
            correct: 0,
            explanation: "Setzt man in das charakteristische Polynom $\\lambda = 0$ ein, erhält man direkt die Determinante: $p_A(0) = \\det(A - 0 \\cdot I) = \\det(A)$. Da $p_A(0) = -(0)^3 + 2(0)^2 + 1 = 1$, ist $\\det(A) = 1$."
        },
        {
            id: 4,
            question: "Sei $A := \\begin{pmatrix}3 & 2 & 7 & 1\\\\ -1 & -2 & -1 & 1\\\\ 3 & 7 & 4 & -3\\end{pmatrix}$. Welche der folgenden Mengen ist eine Basis für den $\\ker(A)$?",
            options: [
                "Die Menge bestehend aus den Vektoren $(1, 1, -1, 2)^T$ und $(-2, -2, 2, -4)^T$",
                "Die Menge bestehend nur aus dem Vektor $(1, 1, -1, 2)^T$",
                "Die Menge bestehend aus den drei Standardbasisvektoren $e_1, e_2, e_3$",
                "Die leere Menge"
            ],
            correct: 1,
            explanation: "Die Matrix $A$ hat den Rang 3 (die Zeilen/Spalten sind linear unabhängig). Nach dem Rangsatz gilt: $\\dim(\\ker A) = n - \\operatorname{Rang}(A) = 4 - 3 = 1$. Die Basis muss also aus exakt einem Vektor bestehen. Multipliziert man $A$ probeweise mit $(1, 1, -1, 2)^T$, erhält man den Nullvektor. Also ist Option (B) korrekt. (A) ist falsch, da die Vektoren kollinear (linear abhängig) sind."
        },
        {
            id: 5,
            question: "Ein Vektor $v \\in \\mathbb{R}^2$ habe bezüglich der Basis $B := \\{\\begin{pmatrix}1\\\\ -1\\end{pmatrix}, \\begin{pmatrix}3\\\\ 5\\end{pmatrix}\\}$ die Koordinaten $\\begin{pmatrix}1\\\\ 1\\end{pmatrix}$. Die Koordinaten von $v$ bezüglich der Standardbasis sind dann...",
            options: [
                "$\\begin{pmatrix}1\\\\ 1\\end{pmatrix}$",
                "$\\begin{pmatrix}2\\\\ 2\\end{pmatrix}$",
                "$\\begin{pmatrix}5/8\\\\ 1/8\\end{pmatrix}$",
                "$\\begin{pmatrix}4\\\\ 4\\end{pmatrix}$"
            ],
            correct: 3,
            explanation: "Die Koordinatendarstellung gibt an, wie oft man die Basisvektoren addieren muss. Wir rechnen einfach: $v = 1 \\cdot \\begin{pmatrix}1\\\\ -1\\end{pmatrix} + 1 \\cdot \\begin{pmatrix}3\\\\ 5\\end{pmatrix} = \\begin{pmatrix}1+3\\\\ -1+5\\end{pmatrix} = \\begin{pmatrix}4\\\\ 4\\end{pmatrix}$."
        },
        {
            id: 6,
            question: "Welcher Vektor ergänzt die Menge $\\{\\frac{1}{\\sqrt{3}}\\begin{pmatrix}1\\\\ 1\\\\ 1\\end{pmatrix}, \\frac{1}{\\sqrt{2}}\\begin{pmatrix}1\\\\ -1\\\\ 0\\end{pmatrix}\\}$ zu einer Orthonormalbasis von $\\mathbb{R}^3$?",
            options: [
                "$\\frac{1}{\\sqrt{2}}(0, -1, 1)^T$",
                "$\\frac{1}{\\sqrt{6}}(1, 1, -2)^T$",
                "$\\frac{1}{\\sqrt{3}}(1, 1, -1)^T$",
                "$(1, 0, 0)^T$"
            ],
            correct: 1,
            explanation: "Der gesuchte Vektor muss orthogonal zu den beiden bestehenden Vektoren stehen und die Norm (Länge) 1 besitzen. Man berechnet das Vektorprodukt der Vektoren $(1, 1, 1)^T$ und $(1, -1, 0)^T$. Das ergibt $(1, 1, -2)^T$. Normiert man diesen Vektor durch Teilen durch seine Länge $\\sqrt{1^2 + 1^2 + (-2)^2} = \\sqrt{6}$, erhält man $\\frac{1}{\\sqrt{6}}(1, 1, -2)^T$."
        },
        {
            id: 7,
            question: "Welcher der folgenden Vektoren ist ein Eigenvektor der Matrix $\\begin{pmatrix}1 & 1 & 0\\\\ 1 & 0 & 1\\\\ 0 & 1 & 1\\end{pmatrix}$?",
            options: [
                "$(-2, 1, 1)^T$",
                "$(0, 3, 2)^T$",
                "$(1, -2, 1)^T$",
                "$(0, 1, 1)^T$"
            ],
            correct: 2,
            explanation: "Man testet durch einfache Matrix-Vektor-Multiplikation. Für (C) gilt: $\\begin{pmatrix}1 & 1 & 0\\\\ 1 & 0 & 1\\\\ 0 & 1 & 1\\end{pmatrix} \\cdot \\begin{pmatrix}1\\\\ -2\\\\ 1\\end{pmatrix} = \\begin{pmatrix}-1\\\\ 2\\\\ -1\\end{pmatrix} = -1 \\cdot \\begin{pmatrix}1\\\\ -2\\\\ 1\\end{pmatrix}$. Dies erfüllt die Eigenwertgleichung $Av = \\lambda v$ mit dem Eigenwert $\\lambda = -1$."
        },
        {
            id: 8,
            question: "Sei $A = \\begin{pmatrix}1 & -6 & 0\\\\ -6 & 1 & 0\\\\ 0 & 0 & 3\\end{pmatrix}$ und $q_A$ die quadratische Form von $A$. Welche Aussage ist <b>falsch</b>?",
            options: [
                "Die quadratische Form $q_A$ ist indefinit.",
                "Die Matrix $B = \\operatorname{diag}(-2, 3, 100)$ hat dieselbe Signatur wie die Matrix $A$.",
                "Es gilt $\\max_{\\|x\\|^2=1} q_A(x) = 7$.",
                "$q_A(x) = x_1^2 - 6x_1x_2 + x_2^2 + 3x_3^2$"
            ],
            correct: 3,
            explanation: "Die Formel für eine quadratische Form lautet $q_A(x) = x^T A x$. Setzt man die Matrix $A$ ein, erhält man $x_1^2 - 12x_1x_2 + x_2^2 + 3x_3^2$. In Antwort (D) steht fälschlicherweise $-6x_1x_2$ (man darf nicht vergessen, dass sich die Nebendiagonalelemente addieren: $A_{12}x_1x_2 + A_{21}x_2x_1 = -12x_1x_2$). Daher ist (D) die gesuchte falsche Aussage."
        },
        {
            id: 9,
            question: "Für welchen Wert von $a \\in \\mathbb{R}$ ist die Matrix $\\begin{pmatrix}0 & 1 & 0\\\\ 1 & 0 & a\\\\ 1 & 0 & -a\\end{pmatrix}$ orthogonal?",
            options: [
                "-1",
                "$\\sqrt{2}$",
                "1",
                "Es gibt kein solches a."
            ],
            correct: 3,
            explanation: "Eine Matrix ist nur dann orthogonal, wenn alle ihre Spaltenvektoren die Norm (Länge) 1 besitzen und zueinander senkrecht stehen. Der erste Spaltenvektor lautet $(0, 1, 1)^T$. Dessen Länge ist $\\sqrt{0^2 + 1^2 + 1^2} = \\sqrt{2} \\neq 1$. Die Matrix kann also unabhängig von der Wahl von $a$ niemals orthogonal sein."
        },
        {
            id: 10,
            question: "Sei $V \\subset \\mathbb{R}^3$ der Untervektorraum mit der Basis $\\{\\begin{pmatrix}1\\\\ 1\\\\ 0\\end{pmatrix}, \\begin{pmatrix}1\\\\ -3\\\\ 0\\end{pmatrix}\\}$. Was ist die Orthogonalprojektion des Vektors $(1, 2, 3)^T$ auf $V$ bezüglich des Standardskalarprodukts?",
            options: [
                "$(\\frac{1}{\\sqrt{5}}, \\frac{2}{\\sqrt{5}}, 0)^T$",
                "$(0, 2, 0)^T$",
                "$(1, 2, 0)^T$",
                "$(1, 2, 3)^T$"
            ],
            correct: 2,
            explanation: "Man erkennt sofort, dass die Basisvektoren von $V$ nur Komponenten in der $xy$-Ebene (also $z=0$) besitzen. Der Raum $V$ ist somit exakt die $xy$-Ebene. Die Orthogonalprojektion eines beliebigen Punktes $(x,y,z)$ auf diese Ebene besteht einfach darin, die $z$-Koordinate fallen zu lassen. Aus $(1, 2, 3)^T$ wird also $(1, 2, 0)^T$."
        },
        {
            id: 11,
            question: "Sei $U := \\{A \\in \\mathbb{R}^{3\\times3} : A = A^T \\text{ und } \\operatorname{spur}(A) = 0\\}$. Welche der folgenden Aussagen ist wahr?",
            options: [
                "$\\dim U = 6$",
                "$\\dim U = 5$",
                "$\\dim U = 3$",
                "Die Menge $U$ ist kein Untervektorraum."
            ],
            correct: 1,
            explanation: "Der Raum der symmetrischen $3 \\times 3$-Matrizen ($A = A^T$) hat standardmäßig $6$ Freiheitsgrade (die 3 Diagonalelemente und die 3 Elemente oberhalb der Diagonale). Die zusätzliche Bedingung $\\operatorname{spur}(A) = A_{11} + A_{22} + A_{33} = 0$ ist eine einzelne lineare Restriktion. Daher reduziert sich die Dimension um exakt 1. Es bleiben $6 - 1 = 5$ Dimensionen."
        },
        {
            id: 12,
            question: "Was ist das Ergebnis von: $\\begin{pmatrix}0 & 1 & 0\\end{pmatrix} \\begin{pmatrix}1 & e & 4\\\\ 0 & \\sqrt{2} & 1\\\\ \\sqrt{17} & \\pi & 7\\end{pmatrix} \\begin{pmatrix}-1 & 0 & 0\\\\ 0 & -1 & 0\\\\ 0 & 0 & -1\\end{pmatrix} \\begin{pmatrix}8 & -\\sqrt{3} & e\\\\ 7 & 3 & -1\\\\ 1 & 2 & \\sqrt{2}\\end{pmatrix} \\begin{pmatrix}0\\\\ 0\\\\ 1\\end{pmatrix}$?",
            options: [
                "$\\sqrt{2}$",
                "$\\sqrt{2} + e$",
                "0",
                "$-e^2 + \\sqrt{2} - \\pi\\sqrt{2}$"
            ],
            correct: 2,
            explanation: "Anstatt alles auszumultiplizieren, kann man den Ablauf logisch verfolgen: Die Links-Multiplikation mit $(0, 1, 0)$ extrahiert einfach die zweite Zeile der nachfolgenden Matrix. Am Ende der Kette extrahiert die Rechts-Multiplikation mit $(0,0,1)^T$ die dritte Spalte der Matrix davor. Es zeigt sich rechnerisch in der Mitte eine Auslöschung auf 0."
        },
        {
            id: 13,
            question: "Sei $A \\in \\mathbb{R}^{n\\times n}$ mit $n > 1$. Welche der folgenden Aussagen ist im Allgemeinen <b>falsch</b>?",
            options: [
                "Wenn A symmetrisch ist, dann ist für jeden Eigenwert die geometrische gleich der algebraischen Vielfachheit.",
                "Falls n ungerade ist, hat A einen reellen Eigenwert.",
                "Wenn die Anzahl verschiedener reeller Nullstellen des char. Polynoms gleich n ist, dann ist A diagonalisierbar.",
                "Falls n gerade ist, hat A einen reellen Eigenwert."
            ],
            correct: 3,
            explanation: "Option (D) ist falsch, denn Matrizen mit geradem $n$ (z.B. $n=2$) müssen keinen reellen Eigenwert haben. Das klassische Gegenbeispiel ist eine $2 \\times 2$ Rotationsmatrix (z.B. um 90 Grad). Ihr charakteristisches Polynom ist $\\lambda^2 + 1 = 0$, was nur komplexe Nullstellen (Eigenwerte $\\pm i$) besitzt."
        },
        {
            id: 14,
            question: "Sei $n > 1$. Welche der folgenden Aussagen gilt <b>nicht</b> allgemein für $A, B \\in \\mathbb{R}^{n\\times n}$?",
            options: [
                "$\\det(AB) = \\det(BA)$",
                "$\\det(A) = 1/\\det(A^{-1})$",
                "$\\det(\\det(A)B) = \\det(A) \\cdot \\det(B)$",
                "$\\det(AB) = \\det(A^T) \\cdot \\det(B)$"
            ],
            correct: 2,
            explanation: "Die Aussage (C) ist falsch. Die Determinante einer Matrix $A$ ist ein reeller Skalar (nennen wir ihn $k$). Die Rechenregel für Skalare lautet $\\det(kB) = k^n \\det(B)$. Demnach wäre $\\det(\\det(A)B) = (\\det A)^n \\cdot \\det(B)$, was für $n > 1$ im Allgemeinen ungleich $\\det(A)\\det(B)$ ist."
        },
        {
            id: 15,
            question: "Welches ist die Inverse der Matrix $\\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & 2\\\\ 0 & 0 & 1\\end{pmatrix}$?",
            options: [
                "$\\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & 1/2\\\\ 0 & 0 & 1\\end{pmatrix}$",
                "$\\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & 0\\\\ 0 & -2 & 1\\end{pmatrix}$",
                "$\\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & -2\\\\ 0 & 0 & 1\\end{pmatrix}$",
                "$\\begin{pmatrix}1 & 0 & 0\\\\ 0 & -1 & 2\\\\ 0 & 0 & -1\\end{pmatrix}$"
            ],
            correct: 2,
            explanation: "Man kann die gegebene Matrix mit den Antwortmöglichkeiten multiplizieren. Bei Option (C) erhält man: $\\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & 2\\\\ 0 & 0 & 1\\end{pmatrix} \\cdot \\begin{pmatrix}-1 & 0 & 0\\\\ 0 & 1 & -2\\\\ 0 & 0 & 1\\end{pmatrix} = \\begin{pmatrix}1 & 0 & 0\\\\ 0 & 1 & 0\\\\ 0 & 0 & 1\\end{pmatrix}$, also die Einheitsmatrix."
        },
        {
            id: 16,
            question: "Für welches $a \\in \\mathbb{R}$ ist die Matrix $\\begin{pmatrix}1 & 0 & 3\\\\ 2 & 0 & 6\\\\ 3 & 0 & a\\end{pmatrix}$ halbeinfach (diagonalisierbar), aber nicht einfach?",
            options: [
                "$a = 0$",
                "$a = 9$",
                "$a = 1$",
                "$a = 6$"
            ],
            correct: 1,
            explanation: "Eine Matrix ist 'halbeinfach', wenn sie diagonalisierbar ist. Sie ist 'nicht einfach', wenn sie mindestens einen mehrfachen Eigenwert hat. Für $a = 9$ sieht man, dass die dritte Spalte $(3, 6, 9)^T$ genau das Dreifache der ersten Spalte ist. Die Matrix hat damit nur Rang 1, was bedeutet, dass der Eigenwert 0 die geometrische Vielfachheit 2 hat. Berechnet man die Spur, ist diese $1 + 0 + 9 = 10$. Die Eigenwerte sind somit 0, 0, 10. Da geometrische = algebraische Vielfachheit für 0 gilt, ist sie diagonalisierbar (halbeinfach), hat aber nicht lauter verschiedene Eigenwerte (da 0 mehrfach auftritt, also nicht einfach)."
        },
        {
            id: 17,
            question: "Welchen Wert hat die Determinante der Matrix $\\begin{pmatrix}-1 & -1 & -1 & -1\\\\ 0 & 1 & -1 & 0\\\\ 0 & 2 & 2 & 3\\\\ 1 & 0 & 2 & 0\\end{pmatrix}$?",
            options: [
                "3",
                "-4",
                "-3",
                "4"
            ],
            correct: 3,
            explanation: "Durch Entwicklung nach Zeilen/Spalten oder systematisches Umformen (Gauss-Elimination) auf Dreiecksform lässt sich die Determinante berechnen. Am Ende resultiert der Wert 4."
        },
        {
            id: 18,
            question: "Betrachten Sie die Abbildung $f(x) = M \\cdot x + v$, wobei $M$ eine $3 \\times 3$-Matrix mit Kosinus/Sinus-Werten (45 Grad) auf der $x_1 x_2$-Ebene ist und $v = (1, 2, 3)^T$. Welche Aussage ist wahr?",
            options: [
                "Die Abbildung beschreibt eine Translation mit $(1,2,3)^T$ gefolgt von einer Drehung um 45 Grad.",
                "Die Abbildung $f$ ist linear.",
                "Die Abbildung beschreibt eine Rotation um 45 Grad um die $x_3$-Achse gefolgt von einer Translation mit $(1,2,3)^T$.",
                "Die Abbildung beschreibt eine Spiegelung an der $x_1 x_2$-Ebene gefolgt von einer Translation."
            ],
            correct: 2,
            explanation: "Die Reihenfolge von Transformationen bei $f(x) = M x + v$ ist: Zuerst wird der Vektor $x$ mit $M$ multipliziert (Rotation um die $z$- bzw. $x_3$-Achse), und *danach* wird der Vektor $v$ addiert (Translation). Die Abbildung ist zudem nicht linear, sondern affin (wegen der Translation)."
        },
        {
            id: 19,
            question: "Sei $A \\in \\mathbb{R}^{4\\times4}$ eine Matrix, die ähnlich zu $B = \\operatorname{diag}(2, 2, 1, 1)$ ist, d.h. $A = T^{-1}BT$ für reguläres $T$. Welche Aussage ist im Allgemeinen <b>falsch</b>?",
            options: [
                "A ist nicht diagonalisierbar.",
                "$\\operatorname{spur}(A) = 6$.",
                "A hat die gleichen Eigenvektoren wie B.",
                "A hat die gleichen Eigenwerte wie B."
            ],
            correct: 2,
            explanation: "Ähnliche Matrizen teilen viele Invarianten wie Spur, Determinante und die Eigenwerte (deshalb sind B und D wahr). Jedoch verändern sich die Eigenvektoren! Wenn $v$ ein Eigenvektor von $B$ ist, so ist $T^{-1}v$ der entsprechende Eigenvektor von $A$. Sie sind also im Allgemeinen nicht gleich."
        },
        {
            id: 20,
            question: "Sei $A \\in \\mathbb{R}^{m\\times n}$, sodass $Ax = 0$ nur die triviale Lösung hat. Welche Aussage ist sicher korrekt?",
            options: [
                "Für das Bild gilt: $\\dim(\\operatorname{im} A) = 0$.",
                "Für den Kern gilt: $\\dim(\\ker A) = m$.",
                "Es gilt: $\\dim(\\operatorname{im} A) + \\dim(\\ker A) = mn$.",
                "Für das Bild gilt: $\\dim(\\operatorname{im} A) = n$."
            ],
            correct: 3,
            explanation: "Dass $Ax = 0$ nur die triviale Lösung hat, bedeutet, dass der Kern der Matrix nur aus dem Nullvektor besteht. Also ist $\\dim(\\ker A) = 0$. Nach dem Rangsatz gilt $\\dim(\\operatorname{im} A) + \\dim(\\ker A) = n$ (wobei $n$ die Anzahl der Spalten ist). Da $\\ker = 0$ ist, folgt daraus zwingend, dass die Bild-Dimension $n$ sein muss."
        }
    ];

    let totalQuestions = quizQuestions.length;
    let checkedCount = 0;
    let correctCount = 0;

    const container = document.getElementById('quiz-container');

    document.getElementById('checked-counter').innerText = `0 von ${totalQuestions} Fragen gelöst`;

    quizQuestions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${q.id}`;

        let optionsHtml = '';
        q.options.forEach((opt, optIndex) => {
            optionsHtml += `
                <li>
                    <label id="label-${q.id}-${optIndex}">
                        <input type="radio" name="q${q.id}" value="${optIndex}">
                        <span>${opt}</span>
                    </label>
                </li>
            `;
        });

        // HIER IST DIE ÄNDERUNG: Aufgabe ${index + 1} anstatt Aufgabe 1.MC${index + 1}
        card.innerHTML = `
            <div class="question-header">Aufgabe ${index + 1}</div>
            <div class="question-text">${q.question}</div>
            <ul class="options-list">
                ${optionsHtml}
            </ul>
            <button type="button" class="btn-check" id="btn-${q.id}" onclick="validateQuestion(${q.id})">Frage prüfen</button>
            <div class="explanation-box" id="expl-${q.id}">
                <div class="explanation-title">Erklärung:</div>
                <div id="expl-text-${q.id}">${q.explanation}</div>
            </div>
        `;
        container.appendChild(card);
    });

    function validateQuestion(qId) {
        const selectedRadio = document.querySelector(`input[name="q${qId}"]:checked`);
        
        if (!selectedRadio) {
            alert("Bitte wähle zuerst eine Antwort aus!");
            return;
        }

        const checkedBtn = document.getElementById(`btn-${qId}`);
        checkedBtn.disabled = true;
        checkedBtn.innerText = "Überprüft";

        const radios = document.querySelectorAll(`input[name="q${qId}"]`);
        radios.forEach(r => r.disabled = true);

        const qData = quizQuestions.find(q => q.id === qId);
        const selectedValue = parseInt(selectedRadio.value);
        const correctValue = qData.correct;

        if (selectedValue === correctValue) {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('correct-answer');
            correctCount++;
        } else {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('wrong-answer');
            document.getElementById(`label-${qId}-${correctValue}`).classList.add('correct-answer');
        }

        document.getElementById(`expl-${qId}`).style.display = 'block';

        checkedCount++;
        updateGlobalProgress();
        
        if (window.MathJax) {
            MathJax.typesetPromise([document.getElementById(`expl-${qId}`)]);
        }
    }

    function updateGlobalProgress() {
        const percent = (checkedCount / totalQuestions) * 100;
        document.getElementById('global-progress').style.width = `${percent}%`;
        document.getElementById('checked-counter').innerText = `${checkedCount} von ${totalQuestions} Fragen gelöst`;
        
        const successPercent = checkedCount > 0 ? Math.round((correctCount / checkedCount) * 100) : 0;
        document.getElementById('correct-counter').innerText = `Richtig: ${correctCount} (${successPercent}%)`;
    }
</script>

</body>
</html>
