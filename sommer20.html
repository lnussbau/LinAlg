<script>
    const quizQuestions = [
        {
            id: 1,
            question: "Betrachten Sie das folgende lineare Gleichungssystem:<br>$ax + (3 + a)y = a$<br>$(3 + a)x + 3y = a$<br>wobei $a \\in \\mathbb{R}$. Welche Aussage ist richtig?",
            options: [
                "Für $a = 2$ hat das Gleichungssystem keine Lösung.",
                "Für $a = 1$ hat das Gleichungssystem zwei Lösungen.",
                "Für $a = -3$ hat das Gleichungssystem genau eine Lösung.",
                "Für $a = 3$ hat das Gleichungssystem unendlich viele Lösungen."
            ],
            correct: 2,
            explanation: "Die Lösbarkeit lässt sich über die Determinante der Koeffizientenmatrix prüfen: $\\det(A) = a \\cdot 3 - (3+a)^2 = 3a - (9 + 6a + a^2) = -a^2 - 3a - 9$. Setzen wir $a = -3$ ein, erhalten wir $\\det(A) = -(-3)^2 - 3(-3) - 9 = -9 + 9 - 9 = -9$. Da die Determinante ungleich 0 ist, ist das System für $a = -3$ eindeutig lösbar."
        },
        {
            id: 2,
            question: "Betrachten Sie das folgende lineare Gleichungssystem:<br>$x + 3y - 2z = 1$<br>$2x + y + z = -3$<br>$3x - y - z = 2$<br>Es gilt:",
            options: [
                "Das lineare Gleichungssystem hat keine Lösung.",
                "Das lineare Gleichungssystem hat genau eine Lösung.",
                "Das lineare Gleichungssystem hat genau zwei unterschiedliche Lösungen.",
                "Das lineare Gleichungssystem hat unendlich viele Lösungen."
            ],
            correct: 1,
            explanation: "Berechnet man die Determinante der $3\\times3$-Koeffizientenmatrix (z.B. mit Sarrus), erhält man $1(-1+1) - 3(-2-3) - 2(-2-3) = 0 + 15 + 10 = 25$. Da die Determinante ungleich 0 ist, hat das Gleichungssystem genau eine eindeutige Lösung."
        },
        {
            id: 3,
            question: "Es sei $A := \\begin{pmatrix}1 & 2 & 5 & 0\\\\ 0 & 3 & 2 & 1\\\\ 0 & 0 & 2 & 2\\end{pmatrix}$. Was ist $\\dim(\\ker(A))$?",
            options: [
                "0",
                "2",
                "1",
                "3"
            ],
            correct: 2,
            explanation: "Die Matrix $A$ liegt bereits in Zeilenstufenform vor. Man sieht, dass es 3 Nicht-Nullzeilen (also 3 Pivots) gibt. Der Rang der Matrix ist somit 3. Nach dem Rangsatz gilt: Dimension des Kerns = Spaltenanzahl - Rang. Das ergibt $4 - 3 = 1$."
        },
        {
            id: 4,
            question: "Betrachten Sie die Matrix $A := \\begin{pmatrix}1 & 1 & -1\\\\ 0 & 1 & 0\\\\ -1 & 0 & 1\\end{pmatrix}$. Welcher der folgenden Vektoren liegt <b>nicht</b> im Bild von A?",
            options: [
                "$(0, 1, 1)^T$",
                "$(1, -1, 1)^T$",
                "$(2, 1, -1)^T$",
                "$(-1, 0, 1)^T$"
            ],
            correct: 1,
            explanation: "Das Bild von $A$ besteht aus allen Linearkombinationen der Spalten. Betrachtet man die Matrix genau, sieht man, dass die Summe der 1. und 3. Zeile exakt Null ergibt ($1-1=0$, $1+0=0$, $-1+1=0$). Jeder Vektor $b=(b_1, b_2, b_3)^T$ im Bild von $A$ muss diese Eigenschaft ebenfalls erfüllen: $b_1 + b_3 = 0$. Prüft man die Antwortmöglichkeiten, so gilt das für (a), (c) und (d). Nur bei (b) ist $1 + 1 = 2 \\neq 0$. Folglich liegt Vektor (b) nicht im Bild."
        },
        {
            id: 5,
            question: "In $\\mathbb{R}^2$ seien die Basen $B := (b_1, b_2)$ und $B' := (b'_1, b'_2)$ gegeben, wobei $b_1 := \\begin{pmatrix}1\\\\ 1\\end{pmatrix}, b_2 := \\begin{pmatrix}2\\\\ -1\\end{pmatrix}, b'_1 := \\begin{pmatrix}1\\\\ 0\\end{pmatrix}, b'_2 := \\begin{pmatrix}0\\\\ 2\\end{pmatrix}$. Welche Matrix entspricht der Übergangsmatrix von $B$ nach $B'$?",
            options: [
                "$\\begin{pmatrix}1 & -2\\\\ 1/2 & -1/2\\end{pmatrix}$",
                "$\\begin{pmatrix}1 & 2\\\\ 1/2 & -1/2\\end{pmatrix}$",
                "$\\begin{pmatrix}-1/3 & 4/3\\\\ 1/3 & -2/3\\end{pmatrix}$",
                "$\\begin{pmatrix}1/3 & -4/3\\\\ -1/3 & 2/3\\end{pmatrix}$"
            ],
            correct: 1,
            explanation: "Die Spalten der Übergangsmatrix von B nach B' sind die Koordinaten der Vektoren $b_i$ bezüglich der neuen Basis $B'$. <br>Für $b_1$: $\\begin{pmatrix}1\\\\ 1\\end{pmatrix} = 1\\cdot \\begin{pmatrix}1\\\\ 0\\end{pmatrix} + \\frac{1}{2}\\cdot \\begin{pmatrix}0\\\\ 2\\end{pmatrix}$. Die 1. Spalte ist also $\\begin{pmatrix}1\\\\ 1/2\\end{pmatrix}$. <br>Für $b_2$: $\\begin{pmatrix}2\\\\ -1\\end{pmatrix} = 2\\cdot \\begin{pmatrix}1\\\\ 0\\end{pmatrix} - \\frac{1}{2}\\cdot \\begin{pmatrix}0\\\\ 2\\end{pmatrix}$. Die 2. Spalte ist $\\begin{pmatrix}2\\\\ -1/2\\end{pmatrix}$. <br>Beides zusammen ergibt Matrix (b)."
        },
        {
            id: 6,
            question: "Welcher der folgenden Vektoren ergänzt $b_1 := \\begin{pmatrix}1\\\\ 1\\\\ 1\\end{pmatrix}, b_2 := \\begin{pmatrix}2\\\\ -1\\\\ 0\\end{pmatrix}$ zu einer Basis des $\\mathbb{R}^3$?",
            options: [
                "$(3, 0, 1)^T$",
                "$(-1, 2, 1)^T$",
                "$(2, -1, 0)^T$",
                "$(1, 2, -3)^T$"
            ],
            correct: 3,
            explanation: "Ein einfacher Weg, einen garantiert linear unabhängigen dritten Vektor zu finden, ist die Berechnung des Kreuzprodukts (Vektorprodukts) von $b_1$ und $b_2$: $(1, 1, 1)^T \\times (2, -1, 0)^T = (0 - (-1), 2 - 0, -1 - 2)^T = (1, 2, -3)^T$. Dieser Vektor steht senkrecht auf den beiden anderen und ist somit sicher linear unabhängig."
        },
        {
            id: 7,
            question: "Es sei $A := \\begin{pmatrix}1 & 1 & 1\\\\ 1 & 2 & 4\\\\ 1 & 3 & 9\\end{pmatrix}$. Was ist $\\det(A)$?",
            options: [
                "3",
                "2",
                "4",
                "-1"
            ],
            correct: 1,
            explanation: "Dies ist eine Vandermonde-Matrix mit den Werten $x_1=1$, $x_2=2$, $x_3=3$. Ihre Determinante lässt sich mit der Formel $\\prod_{1 \\le i < j \\le 3} (x_j - x_i)$ berechnen: $(x_2 - x_1)(x_3 - x_1)(x_3 - x_2) = (2-1)(3-1)(3-2) = 1 \\cdot 2 \\cdot 1 = 2$. Alternativ liefert die Regel von Sarrus das gleiche Ergebnis."
        },
        {
            id: 8,
            question: "Es sei $A := \\begin{pmatrix}1 & 2 & 0\\\\ 0 & -1 & 2\\\\ 0 & 0 & 1\\end{pmatrix}$ und $B = A^4$. Wie lautet der Eintrag $b_{13}$?",
            options: [
                "12",
                "4",
                "6",
                "8"
            ],
            correct: 3,
            explanation: "Man kann dies durch Ausrechnen herleiten: Zuerst berechnen wir $A^2 = A \\cdot A = \\begin{pmatrix}1 & 0 & 4\\\\ 0 & 1 & -2\\\\ 0 & 0 & 1\\end{pmatrix}$. Jetzt berechnen wir $A^4 = A^2 \\cdot A^2$. Der gesuchte Eintrag $b_{13}$ ist das Skalarprodukt aus der 1. Zeile von $A^2$ und der 3. Spalte von $A^2$: $1(4) + 0(-2) + 4(1) = 4 + 0 + 4 = 8$."
        },
        {
            id: 9,
            question: "Es sei $U := \\{A \\in \\mathbb{R}^{5\\times5} : A^T = -A\\}$ der Untervektorraum der schiefsymmetrischen Matrizen. Welche der folgenden Aussagen ist korrekt?",
            options: [
                "$\\dim(U) = 6$",
                "$\\dim(U) = 15$",
                "$\\dim(U) = 3$",
                "$\\dim(U) = 10$"
            ],
            correct: 3,
            explanation: "Die Dimension des Raums der schiefsymmetrischen $n \\times n$ Matrizen berechnet sich aus der Anzahl der Elemente oberhalb der Hauptdiagonale, da die Diagonale zwingend 0 sein muss und die untere Dreiecksmatrix durch die obere determiniert wird. Die Formel ist $\\frac{n(n-1)}{2}$. Für $n=5$ ist dies $\\frac{5(4)}{2} = 10$."
        },
        {
            id: 10,
            question: "Es seien $u, v, w \\in \\mathbb{R}^3$ drei Vektoren. Welche der folgenden Aussagen ist <b>falsch</b>?",
            options: [
                "Falls die Vektoren u, v, w linear unabhängig sind, dann sind die Vektoren u und v linear unabhängig.",
                "Falls einer der Vektoren u, v, w der Nullvektor ist, so sind u, v, w linear abhängig.",
                "Die Vektoren u und v sind linear abhängig genau dann, wenn ein Vektor ein Vielfaches des andern ist.",
                "Falls sowohl u, v wie auch v, w linear unabhängig sind, dann sind u, w linear unabhängig."
            ],
            correct: 3,
            explanation: "Die Aussage in (d) ist falsch (und somit die gesuchte Antwort). Beispiel: Wenn $u = (1,0,0)^T$ und $w = (1,0,0)^T$ sowie $v = (0,1,0)^T$, dann sind $u, v$ linear unabhängig und $v, w$ sind linear unabhängig. Aber $u$ und $w$ sind identisch und somit offensichtlich linear abhängig!"
        },
        {
            id: 11,
            question: "Es sei $A := \\begin{pmatrix}1 & 1 & 1\\\\ 2 & 0 & 1\\\\ 0 & 0 & -1\\end{pmatrix}$. Welches der folgenden Polynome ist das charakteristische Polynom $p_A(\\lambda)$?",
            options: [
                "$q(\\lambda) = -\\lambda^3 + 3\\lambda + 2$",
                "$q(\\lambda) = -\\lambda^3 - 3\\lambda + 2$",
                "$q(\\lambda) = -\\lambda^3 + 2\\lambda + 3$",
                "$q(\\lambda) = -\\lambda^3 - 2\\lambda + 3$"
            ],
            correct: 0,
            explanation: "Das charakteristische Polynom lautet $\\det(A - \\lambda I)$. Entwickelt man nach der letzten Zeile, erhält man $(-1-\\lambda) \\cdot \\det\\begin{pmatrix}1-\\lambda & 1\\\\ 2 & -\\lambda\\end{pmatrix} = (-1-\\lambda)(-\\lambda(1-\\lambda) - 2) = (-1-\\lambda)(\\lambda^2 - \\lambda - 2)$. Wenn man das ausmultipliziert, ergibt sich $-\\lambda^3 + \\lambda^2 + 2\\lambda - \\lambda^2 + \\lambda + 2 = -\\lambda^3 + 3\\lambda + 2$."
        },
        {
            id: 12,
            question: "Betrachten Sie die Matrix $A := \\begin{pmatrix}2 & 1\\\\ 1 & 1\\end{pmatrix}$ (Arnold's cat map). Welche reelle Zahl ist ein Eigenwert?",
            options: [
                "$\\frac{1}{2}(1 + \\sqrt{3})$",
                "$\\frac{1}{2}(5 + \\sqrt{3})$",
                "$\\frac{1}{2}(1 + \\sqrt{5})$",
                "$\\frac{1}{2}(3 + \\sqrt{5})$"
            ],
            correct: 3,
            explanation: "Das charakteristische Polynom ist $\\det(A - \\lambda I) = (2-\\lambda)(1-\\lambda) - 1 = \\lambda^2 - 3\\lambda + 1 = 0$. Die Mitternachtsformel liefert die Lösungen: $\\lambda_{1,2} = \\frac{-(-3) \\pm \\sqrt{(-3)^2 - 4(1)(1)}}{2} = \\frac{3 \\pm \\sqrt{5}}{2}$."
        },
        {
            id: 13,
            question: "Betrachten Sie die Abbildung $f(x) = M x$, wobei $M = \\begin{pmatrix}1/2 & 0 & -\\sqrt{3}/2\\\\ 0 & 1 & 0\\\\ \\sqrt{3}/2 & 0 & 1/2\\end{pmatrix}$. Welche Aussage ist wahr?",
            options: [
                "Die Abbildung $f$ beschreibt eine Spiegelung.",
                "Die Abbildung $f$ beschreibt eine Translation.",
                "Die Abbildung $f$ beschreibt eine Drehung um die $x_2$-Achse um $60^\\circ$.",
                "Die Abbildung $f$ beschreibt eine Drehung um die $x_1$-Achse um $45^\\circ$."
            ],
            correct: 2,
            explanation: "In der Matrix $M$ bleibt die zweite Koordinate (die $x_2$-Achse) durch die 1 in der Mitte unverändert. Das deutet auf eine Drehung um die $x_2$-Achse hin. Die verbleibenden Einträge bilden eine Rotationsmatrix $\\begin{pmatrix}\\cos\\theta & -\\sin\\theta\\\\ \\sin\\theta & \\cos\\theta\\end{pmatrix}$. Mit $\\cos\\theta = 1/2$ folgt, dass der Drehwinkel $60^\\circ$ beträgt."
        },
        {
            id: 14,
            question: "Welcher Vektor ergänzt $b_1 := (\\frac{1}{\\sqrt{2}}, \\frac{1}{\\sqrt{2}}, 0)^T, b_2 := (0, 0, 1)^T$ zu einer Orthonormalbasis des $\\mathbb{R}^3$?",
            options: [
                "$(0, \\frac{1}{\\sqrt{2}}, -\\frac{1}{\\sqrt{2}})^T$",
                "$(\\frac{1}{\\sqrt{2}}, -\\frac{1}{\\sqrt{2}}, 0)^T$",
                "$(\\frac{1}{\\sqrt{2}}, 0, \\frac{1}{\\sqrt{2}})^T$",
                "$(0, \\frac{1}{\\sqrt{2}}, \\frac{1}{\\sqrt{2}})^T$"
            ],
            correct: 1,
            explanation: "Der gesuchte Vektor muss orthogonal zu $b_1$ und $b_2$ sein. Ein einfacher Test mit dem Skalarprodukt zeigt, dass das Skalarprodukt von Option (b) mit $b_1$ Null ergibt: $\\frac{1}{\\sqrt{2}}\\cdot\\frac{1}{\\sqrt{2}} + \\frac{1}{\\sqrt{2}}\\cdot(-\\frac{1}{\\sqrt{2}}) + 0 = \\frac{1}{2} - \\frac{1}{2} = 0$. Das Skalarprodukt mit $b_2$ ist ebenfalls 0, und die Länge ist 1. Er bildet somit die perfekte Ergänzung."
        },
        {
            id: 15,
            question: "Es seien $u, v \\in \\mathbb{R}^3$ zwei Vektoren mit $\\langle u, u\\rangle = 1, \\langle v, v\\rangle = 2$ und $\\langle u, v\\rangle = 0$. Was ist $\\langle 2u + v, u + 2v\\rangle$?",
            options: [
                "12",
                "3",
                "6",
                "8"
            ],
            correct: 2,
            explanation: "Da das Skalarprodukt bilinear ist, können wir ausmultiplizieren: $\\langle 2u + v, u + 2v\\rangle = 2\\langle u,u\\rangle + 4\\langle u,v\\rangle + \\langle v,u\\rangle + 2\\langle v,v\\rangle$. Da $\\langle u,v\\rangle = 0$ (die Vektoren sind orthogonal), fallen die mittleren Terme weg. Es bleibt $2(1) + 2(2) = 2 + 4 = 6$."
        },
        {
            id: 16,
            question: "Welche der folgenden Abbildungen definiert <b>kein</b> Skalarprodukt auf $\\mathbb{R}^2$?",
            options: [
                "$\\langle (x_1, x_2)^T, (y_1, y_2)^T \\rangle = x_1y_1 - x_2y_2$",
                "$\\langle x, y \\rangle = x_1y_1 + x_1y_2 + y_1x_2 + 4x_2y_2$",
                "$\\langle x, y \\rangle = x_1y_1 + x_1y_2 + y_1x_2 + 2x_2y_2$",
                "$\\langle x, y \\rangle = x_1y_1 - x_1y_2 - y_1x_2 + 3x_2y_2$"
            ],
            correct: 0,
            explanation: "Ein Skalarprodukt muss positiv definit sein, d.h. $\\langle v, v\\rangle > 0$ für alle $v \\neq 0$. Testen wir Option (a) mit dem Einheitsvektor $e_2 = (0, 1)^T$: $\\langle e_2, e_2\\rangle = 0\\cdot0 - 1\\cdot1 = -1$. Da das Ergebnis negativ ist, handelt es sich nicht um ein Skalarprodukt."
        },
        {
            id: 17,
            question: "Es sei $A \\in \\mathbb{R}^{2\\times2}$ eine Matrix, so dass $\\operatorname{im}(A) \\subset \\ker(A)$. Welche Aussage ist <b>immer</b> wahr?",
            options: [
                "$A + A^T = 0$",
                "$A - A^T = 0$",
                "$A^2 + A = 0$",
                "$A^2 = 0$"
            ],
            correct: 3,
            explanation: "Jeder Vektor $y$, der durch die Abbildung erzeugt wird ($y = Ax$), liegt im Bild von A. Da das Bild eine Teilmenge des Kerns ist, liegt dieser Vektor $y$ also auch im Kern. Wenn ein Vektor im Kern liegt, bedeutet das, dass die Anwendung der Matrix $A$ auf ihn Null ergibt. Also: $A(y) = 0 \\Rightarrow A(Ax) = 0 \\Rightarrow A^2x = 0$ für alle $x$. Folglich muss $A^2 = 0$ (die Nullmatrix) sein."
        },
        {
            id: 18,
            question: "Betrachten Sie die Menge $M := \\{A \\in \\mathbb{R}^{2\\times2} : A^2 = I_2\\}$. Welche Aussage ist wahr?",
            options: [
                "Die Menge M enthält genau vier Elemente.",
                "Die Menge M enthält unendlich viele Elemente.",
                "Die Menge M enthält genau zwei Elemente.",
                "Die Menge M enthält genau ein Element."
            ],
            correct: 1,
            explanation: "Neben der Einheitsmatrix $I_2$ und $-I_2$ gehört auch jede Spiegelungsmatrix zu dieser Menge (zweimaliges Spiegeln bringt einen Punkt immer an den Ursprungsort zurück). Da es unendlich viele Ursprungsgeraden in der Ebene gibt, an denen man spiegeln kann, gibt es auch unendlich viele solcher Matrizen."
        },
        {
            id: 19,
            question: "Es seien $A, B \\in \\mathbb{R}^{2\\times2}$ symmetrische, positiv definite Matrizen. Welche Aussage ist im Allgemeinen <b>falsch</b>?",
            options: [
                "Die Matrix $AB$ ist symmetrisch und positiv definit.",
                "Die Matrix $A^{-1}$ ist symmetrisch und positiv definit.",
                "Die Matrix $A + B$ ist symmetrisch und positiv definit.",
                "Die Matrix $2A$ ist symmetrisch und positiv definit."
            ],
            correct: 0,
            explanation: "Das Produkt $AB$ zweier symmetrischer Matrizen ist im Allgemeinen nicht symmetrisch, da $(AB)^T = B^T A^T = BA$. Die Matrizen $AB$ und $BA$ sind nur dann gleich (und $AB$ somit symmetrisch), wenn $A$ und $B$ miteinander kommutieren. Ohne diese Eigenschaft fällt Aussage (a) flach."
        },
        {
            id: 20,
            question: "Welche der folgenden Aussagen ist <b>falsch</b>?",
            options: [
                "Die algebraische Vielfachheit eines Eigenwerts ist immer größer gleich der geometrischen.",
                "Falls $A \\in \\mathbb{R}^{2\\times2}$ invertierbar ist, dann gilt $\\ker(A) = \\{\\begin{pmatrix}0\\\\ 0\\end{pmatrix}\\}$.",
                "Falls die Matrix $A$ einzig Null als Eigenwert hat, dann ist $A$ gleich der Nullmatrix.",
                "Falls die Matrix $A^T$ invertierbar ist, dann ist $A$ invertierbar."
            ],
            correct: 2,
            explanation: "Aussage (c) ist falsch, denn es gibt sogenannte nilpotente Matrizen, die keine Nullmatrizen sind, aber trotzdem nur 0 als Eigenwert haben. Ein Beispiel ist $A = \\begin{pmatrix}0 & 1\\\\ 0 & 0\\end{pmatrix}$. Ihr charakteristisches Polynom ist $\\lambda^2 = 0$, also ist der einzige Eigenwert 0, obwohl $A \\neq 0$ ist."
        }
    ];

    let totalQuestions = quizQuestions.length;
    let checkedCount = 0;
    let correctCount = 0;

    const container = document.getElementById('quiz-container');

    document.getElementById('checked-counter').innerText = `0 von ${totalQuestions} Fragen gelöst`;

    quizQuestions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${q.id}`;

        let optionsHtml = '';
        q.options.forEach((opt, optIndex) => {
            optionsHtml += `
                <li>
                    <label id="label-${q.id}-${optIndex}">
                        <input type="radio" name="q${q.id}" value="${optIndex}">
                        <span>${opt}</span>
                    </label>
                </li>
            `;
        });

        card.innerHTML = `
            <div class="question-header">Aufgabe ${index + 1}</div>
            <div class="question-text">${q.question}</div>
            <ul class="options-list">
                ${optionsHtml}
            </ul>
            <button type="button" class="btn-check" id="btn-${q.id}" onclick="validateQuestion(${q.id})">Frage prüfen</button>
            <div class="explanation-box" id="expl-${q.id}">
                <div class="explanation-title">Erklärung:</div>
                <div id="expl-text-${q.id}">${q.explanation}</div>
            </div>
        `;
        container.appendChild(card);
    });

    function validateQuestion(qId) {
        const selectedRadio = document.querySelector(`input[name="q${qId}"]:checked`);
        
        if (!selectedRadio) {
            alert("Bitte wähle zuerst eine Antwort aus!");
            return;
        }

        const checkedBtn = document.getElementById(`btn-${qId}`);
        checkedBtn.disabled = true;
        checkedBtn.innerText = "Überprüft";

        const radios = document.querySelectorAll(`input[name="q${qId}"]`);
        radios.forEach(r => r.disabled = true);

        const qData = quizQuestions.find(q => q.id === qId);
        const selectedValue = parseInt(selectedRadio.value);
        const correctValue = qData.correct;

        if (selectedValue === correctValue) {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('correct-answer');
            correctCount++;
        } else {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('wrong-answer');
            document.getElementById(`label-${qId}-${correctValue}`).classList.add('correct-answer');
        }

        document.getElementById(`expl-${qId}`).style.display = 'block';

        checkedCount++;
        updateGlobalProgress();
        
        if (window.MathJax) {
            MathJax.typesetPromise([document.getElementById(`expl-${qId}`)]);
        }
    }

    function updateGlobalProgress() {
        const percent = (checkedCount / totalQuestions) * 100;
        document.getElementById('global-progress').style.width = `${percent}%`;
        document.getElementById('checked-counter').innerText = `${checkedCount} von ${totalQuestions} Fragen gelöst`;
        
        const successPercent = checkedCount > 0 ? Math.round((correctCount / checkedCount) * 100) : 0;
        document.getElementById('correct-counter').innerText = `Richtig: ${correctCount} (${successPercent}%)`;
    }
</script>

</body>
</html>
