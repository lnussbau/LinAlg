        },
        {
            id: 6,
            question: "Die quadratische Form $x_1^2 + x_2^2 + x_1x_2$ ist",

        },
        {
            id: 7,
            question: "Es sei $A = \\begin{pmatrix}1 & 0 & 0\\\\ 0 & 0 & 1\\\\ 0 & 1 & 0\\end{pmatrix}$ und $F_A: \\mathbb{R}^3 \\rightarrow \\mathbb{R}^3$ die Abbildung $x \\mapsto Ax$. Welche Aussage ist richtig?",
            options: [
                "Die Abbildung $F_A$ beschreibt eine Translation.",

            correct: 1,

        },
        {
            id: 8,
            question: "Sei $A = \\begin{pmatrix}1 & 0 & 1\\\\ 2 & 2 & -2\\\\ 1 & 0 & 1\\end{pmatrix} \\in \\mathbb{R}^{3\\times3}$. Was sind die Eigenwerte von $A^T$?",

        },
        {
            id: 9,
            question: "Betrachten Sie die lineare Abbildung $f : \\mathbb{R}^3 \\rightarrow \\mathbb{R}^3, f(x, y, z)^T = (y, x + 2z, x - y + 2z)^T$. Die zugehörige Darstellungsmatrix bezüglich der Standardbasis lautet:",

        },
        {
            id: 10,
            question: "Seien $A \\in \\mathbb{R}^{3\\times4}$, $B \\in \\mathbb{R}^{3\\times3}$, $C \\in \\mathbb{R}^{4\\times3}$. Welcher der folgenden Ausdrücke ist sinnvoll?",
            options: [

            explanation: "Die korrekte Lösung ist D: $C$ ist eine $4 \\times 3$ Matrix, folglich ist die Transponierte $C^T$ eine $3 \\times 4$ Matrix. Diese hat exakt dieselben Dimensionen wie $A$, daher ist die Addition $A + C^T$ definiert."
        },
        {
            id: 11,
            question: "Seien $v_1 = (1, 1, 1)^T, v_2 = (-1, 0, -2)^T$ Vektoren in $\\mathbb{R}^3$. Welcher der folgenden Vektoren $v$ ist bezüglich des Standardskalarprodukts orthogonal zu $v_1$ und zu $v_2$?",

        },
        {
            id: 12,
            question: "Sei $A = \\begin{pmatrix}-2&2&2\\\\ -1&1&1\\\\ -1&1&1\\end{pmatrix} \\in \\mathbb{R}^{3\\times3}$. Welcher der folgenden Vektoren ist <b>kein</b> Eigenvektor der Matrix A?",

        },
        {

            explanation: "Die korrekte Lösung ist A. Die Umkehrabbildung einer bijektiven linearen Abbildung ist immer ebenfalls linear."
        },
        {
            id: 14,
            question: "Welchen Wert hat die Determinante $\\det \\begin{pmatrix}1&2&3&4\\\\ 3&4&5&6\\\\ 0&0&1+a&a\\\\ 0&0&-a&1-a\\end{pmatrix}$? (Hinweis: Verwenden Sie den Blocksatz.)",

        {

        },

        }
    ];

    let totalQuestions = quizQuestions.length;
    let checkedCount = 0;
    let correctCount = 0;

    const container = document.getElementById('quiz-container');

    document.getElementById('checked-counter').innerText = `0 von ${totalQuestions} Fragen gelöst`;

    quizQuestions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${q.id}`;

        let optionsHtml = '';
        q.options.forEach((opt, optIndex) => {
            optionsHtml += `
                <li>
                    <label id="label-${q.id}-${optIndex}">
                        <input type="radio" name="q${q.id}" value="${optIndex}">
                        <span>${opt}</span>
                    </label>
                </li>
            `;
        });

        card.innerHTML = `
            <div class="question-header">Aufgabe 1.MC${index + 1}</div>
            <div class="question-text">${q.question}</div>
            <ul class="options-list">
                ${optionsHtml}
            </ul>
            <button type="button" class="btn-check" id="btn-${q.id}" onclick="validateQuestion(${q.id})">Frage prüfen</button>
            <div class="explanation-box" id="expl-${q.id}">
                <div class="explanation-title">Erklärung:</div>
                <div id="expl-text-${q.id}">${q.explanation}</div>
            </div>
        `;
        container.appendChild(card);
    });

    function validateQuestion(qId) {
        const selectedRadio = document.querySelector(`input[name="q${qId}"]:checked`);
        
        if (!selectedRadio) {
            alert("Bitte wähle zuerst eine Antwort aus!");
            return;
        }

        const checkedBtn = document.getElementById(`btn-${qId}`);
        checkedBtn.disabled = true;
        checkedBtn.innerText = "Überprüft";

        const radios = document.querySelectorAll(`input[name="q${qId}"]`);
        radios.forEach(r => r.disabled = true);

        const qData = quizQuestions.find(q => q.id === qId);
        const selectedValue = parseInt(selectedRadio.value);
        const correctValue = qData.correct;

        if (selectedValue === correctValue) {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('correct-answer');
            correctCount++;
        } else {
            document.getElementById(`label-${qId}-${selectedValue}`).classList.add('wrong-answer');
            document.getElementById(`label-${qId}-${correctValue}`).classList.add('correct-answer');
        }

        document.getElementById(`expl-${qId}`).style.display = 'block';

        checkedCount++;
        updateGlobalProgress();
        
        if (window.MathJax) {
            MathJax.typesetPromise([document.getElementById(`expl-${qId}`)]);
        }
    }

    function updateGlobalProgress() {
        const percent = (checkedCount / totalQuestions) * 100;
        document.getElementById('global-progress').style.width = `${percent}%`;
        document.getElementById('checked-counter').innerText = `${checkedCount} von ${totalQuestions} Fragen gelöst`;
        
        const successPercent = checkedCount > 0 ? Math.round((correctCount / checkedCount) * 100) : 0;
        document.getElementById('correct-counter').innerText = `Richtig: ${correctCount} (${successPercent}%)`;
    }
</script>

</body>
</html>
